<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Krzysztof Wnęk — Wymieniasz sukces na stres.</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Anton&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    /* From the portrait photos */
    --paper:   #f5f3ec;   /* warm studio off-white */
    --paper-2: #ebe8de;
    --paper-3: #e2dfd3;
    --ink:     #0a0a0a;   /* deep black */
    --ink-2:   #161616;
    --ink-soft:#3a3a3a;
    --ink-dim: #6c6c6c;
    --ink-faint:#a5a39a;
    --line:    #d6d3c8;
    --line-2:  #c1bdb0;
    --navy:    #1e2c47;   /* PQ blazer */
    --accent:  #19c3e6;   /* PQ book cyan */
    --accent-2:#f08a3a;   /* PQ book orange */
    --accent-ink:#0a0a0a;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  body{
    font-family:"Inter",ui-sans-serif,system-ui,sans-serif;
    font-size:16px;line-height:1.6;letter-spacing:.005em;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  ::selection{background:var(--ink);color:var(--paper)}

  /* TYPE — Tony Robbins style heavy condensed display */
  .display{
    font-family:"Oswald",sans-serif;
    font-weight:700; letter-spacing:-.005em; line-height:.92;
    text-transform:uppercase; text-wrap:balance;
  }
  .display-tight{ letter-spacing:-.015em; }
  .anton{
    font-family:"Anton",sans-serif;
    font-weight:400; letter-spacing:.002em; line-height:.92;
    text-transform:uppercase;
  }
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;gap:12px;
    padding:20px 28px;border-radius:0;border:0;cursor:pointer;
    font-family:"Oswald",sans-serif;font-weight:600;font-size:14px;letter-spacing:.18em;text-transform:uppercase;
    text-decoration:none;transition:transform .15s ease, box-shadow .25s ease, background .2s ease, color .2s ease;
    line-height:1;
  }
  .btn-primary{ background:var(--accent); color:var(--accent-ink); }
  .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 10px 30px -8px rgba(25,195,230,.45);}
  .btn-dark{ background:var(--ink); color:var(--paper); }
  .btn-dark:hover{ background:#000; transform:translateY(-1px); }
  .btn-light{ background:var(--paper); color:var(--ink); }
  .btn-light:hover{ background:#fff; }
  .btn-ghost-light{background:transparent;color:var(--ink);border:1.5px solid var(--ink);}
  .btn-ghost-light:hover{background:var(--ink);color:var(--paper);}
  .btn-ghost-dark{background:transparent;color:var(--paper);border:1.5px solid var(--paper);}
  .btn-ghost-dark:hover{background:var(--paper);color:var(--ink);}
  .btn .arrow{display:inline-block;transition:transform .2s ease;font-family:"Inter",sans-serif;font-weight:300;font-size:18px;letter-spacing:0;}
  .btn:hover .arrow{transform:translateX(5px)}

  /* Section scaffolding */
  section{position:relative}
  .wrap{max-width:1480px;margin:0 auto;padding:0 56px;}

  .eyebrow{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ink-dim); display:inline-flex;align-items:center;gap:14px;
  }
  .eyebrow .num{ color:var(--accent); }
  .eyebrow.on-dark{ color:rgba(245,243,236,.5); }
  .eyebrow.on-dark .num{ color:var(--accent); }

  .rule{height:1px;background:var(--line);}
  .rule.on-dark{ background:rgba(255,255,255,.12); }

  @media (max-width: 900px){ .wrap{padding:0 24px} }
</style>

</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="sections-v2.jsx"></script>
<script type="text/babel" src="app-v2.jsx"></script>

</body>
</html>
