<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Krzysztof Wnęk — od "muszę" do "chcę"</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#ffffff;
    --paper-2:#fafaf7;
    --paper-3:#f3f1ec;
    --ink:#0a0d14;
    --ink-2:#181b22;
    --ink-soft:#3a3f48;
    --ink-dim:#6b6f78;
    --ink-faint:#9aa0a8;
    --line:#ebe9e2;
    --line-2:#d8d6cf;
    --accent:#ff4d2e;
    --accent-ink:#ffffff;
    --accent-soft:#ffece6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  body{
    font-family:"Manrope",ui-sans-serif,system-ui,sans-serif;
    font-size:16px;line-height:1.55;letter-spacing:.005em;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;
  }
  ::selection{background:var(--ink);color:var(--paper)}
  .display{font-family:"Archivo",sans-serif;font-weight:900;letter-spacing:-0.025em;line-height:.95;text-wrap:balance;}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}

  .photo{
    position:relative;overflow:hidden;
    background:radial-gradient(120% 80% at 30% 20%,rgba(255,255,255,.10) 0%,transparent 60%),
      radial-gradient(80% 60% at 80% 90%,rgba(0,0,0,.45) 0%,transparent 60%),
      linear-gradient(135deg,#2a2e36 0%,#0e1117 100%);
    color:rgba(255,255,255,.65);isolation:isolate;
  }
  .photo::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px),radial-gradient(rgba(0,0,0,.08) 1px,transparent 1px);
    background-size:3px 3px,4px 4px;background-position:0 0,1px 2px;mix-blend-mode:overlay;opacity:.6;
  }
  .photo .caption{
    position:absolute;left:18px;bottom:14px;display:flex;align-items:center;gap:10px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(255,255,255,.7);background:rgba(0,0,0,.35);padding:6px 10px;border-radius:2px;backdrop-filter:blur(4px);
  }
  .photo .tag,.photo-real .tag{
    position:absolute;left:18px;top:14px;display:flex;align-items:center;gap:8px;
    font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:rgba(255,255,255,.9);background:rgba(0,0,0,.38);padding:5px 10px;border-radius:2px;
    backdrop-filter:blur(4px);z-index:2;
  }
  .photo .tag::before,.photo-real .tag::before{
    content:"";width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 3px rgba(255,77,46,.25);flex-shrink:0;
  }
  .photo-real{position:relative;overflow:hidden;}

  .btn{
    display:inline-flex;align-items:center;gap:10px;padding:18px 26px;border-radius:999px;border:0;cursor:pointer;
    font-family:"Archivo",sans-serif;font-weight:700;font-size:14px;letter-spacing:.04em;text-transform:uppercase;
    text-decoration:none;transition:transform .18s ease,box-shadow .25s ease,background .2s ease,color .2s ease;line-height:1;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px -10px rgba(255,77,46,.55);}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink);}
  .btn-ghost:hover{background:var(--ink);color:var(--paper);}
  .btn .arrow{display:inline-block;transition:transform .2s ease}
  .btn:hover .arrow{transform:translateX(4px)}

  section{position:relative;}
  .wrap{max-width:1360px;margin:0 auto;padding:0 56px;}
  .wrap-wide{max-width:1520px;margin:0 auto;padding:0 56px;}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(255,77,46,.18);}
  .rule{height:1px;background:var(--line);}

  body[data-density="dense"] section.pad{padding-block:120px;}
  body[data-density="regular"] section.pad{padding-block:180px;}
  body[data-density="airy"] section.pad{padding-block:240px;}
  @media(max-width:900px){
    .wrap,.wrap-wide{padding:0 24px}
    body[data-density="dense"] section.pad{padding-block:80px;}
    body[data-density="regular"] section.pad{padding-block:104px;}
    body[data-density="airy"] section.pad{padding-block:140px;}
  }
  @keyframes kw-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .marquee{display:flex;overflow:hidden;border-block:1px solid var(--line);padding:22px 0}
  .marquee .track{display:flex;gap:64px;white-space:nowrap;animation:kw-marquee 60s linear infinite}
  .marquee .item{font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-.01em;font-size:clamp(20px,2.4vw,32px);text-transform:uppercase;color:var(--ink);display:inline-flex;align-items:center;gap:24px}
  .marquee .item .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
</style>
</head>
<body data-density="regular">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ═══════════════════════════ TWEAKS PANEL ═══════════════════════════ */

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;overflow-wrap:anywhere}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-chips{display:flex;gap:6px}
  .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);transition:transform .12s cubic-bezier(.3,.7,.4,1),box-shadow .12s}
  .twk-chip:hover{transform:translateY(-1px);box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = { x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)), y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)) };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable="" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
      </select>
    </TweakRow>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value); valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => { const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s); return m === undefined ? s : typeof m === 'object' ? m.value : m; };
    return <TweakSelect label={label} value={value} options={options} onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => { const r = trackRef.current.getBoundingClientRect(); const inner = r.width - 4; const i = Math.floor(((clientX - r.left - 2) / inner) * n); return opts[Math.max(0, Math.min(n - 1, i))].value; };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}
function __twkIsLight(hex) {
  const h = String(hex).replace('#', ''); const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16); if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255; return r * 299 + g * 587 + b * 114 > 148000;
}
const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} /></svg>
);
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" style={{ width:56, height:22, border:'.5px solid rgba(0,0,0,.1)', borderRadius:6, padding:0, cursor:'default', background:'transparent', flexShrink:0 }} value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase(); const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o]; const [hero, ...rest] = colors; const sup = rest.slice(0, 4); const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'} aria-label={colors.join(', ')} style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

/* ═══════════════════════════ SECTIONS ═══════════════════════════════ */

function Photo({ label, tag, style, children, src }) {
  if (src) {
    return (
      <div className="photo-real" style={style}>
        <img src={src} alt={label || ''} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top', display:'block' }} />
        {tag && <div className="tag">{tag}</div>}
        {children}
      </div>
    );
  }
  return (
    <div className="photo" style={style}>
      {tag && <div className="tag">{tag}</div>}
      {children}
      {label && <div className="caption">{label}</div>}
    </div>
  );
}

function Nav({ onCTAClick }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const on = () => setScrolled(window.scrollY > 16); on();
    window.addEventListener('scroll', on, { passive:true });
    return () => window.removeEventListener('scroll', on);
  }, []);
  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:50,
      padding: scrolled ? '14px 0' : '22px 0',
      background: scrolled ? 'rgba(255,255,255,.82)' : 'transparent',
      backdropFilter: scrolled ? 'blur(18px) saturate(140%)' : 'none',
      WebkitBackdropFilter: scrolled ? 'blur(18px) saturate(140%)' : 'none',
      borderBottom: scrolled ? '1px solid var(--line)' : '1px solid transparent',
      transition:'all .25s ease',
    }}>

const KW_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "#ff4d2e",
  "density": "regular",
  "showDevNotes": false,
  "displayFont": "Archivo",
  "bodyFont": "Manrope",
  "showMarquee": true

function isLight(hex) {
  if (!hex || hex[0] !== '#') return false;
  const h = hex.replace('#','');
  const v = h.length === 3 ? h.split('').map(x => parseInt(x+x,16)) : [0,2,4].map(i => parseInt(h.slice(i,i+2),16));
  return (0.2126*v[0] + 0.7152*v[1] + 0.0722*v[2]) / 255 > 0.62;
}
function hexAlpha(hex, a) {
  if (!hex || hex[0] !== '#') return hex;
  const h = hex.replace('#','');
  const v = h.length === 3 ? h.split('').map(x => parseInt(x+x,16)) : [0,2,4].map(i => parseInt(h.slice(i,i+2),16));
  return `rgba(${v[0]},${v[1]},${v[2]},${a})`;
}

function TestModal({ onClose }) {
  const questions = [
    'Gdy mój zespół popełnia błąd, mój pierwszy odruch to znaleźć, kto zawinił.',
    'Czuję, że nie mogę odpocząć, dopóki nie skończę listy.',
    'Gdy ktoś mówi mi „zrelaksuj się", to mnie irytuje.',
    'Często odpowiadam „dam radę", zanim sprawdzę swój kalendarz.',
    'Mam ciche poczucie, że gdybym przestał napierać, wszystko by się rozpadło.',
  ];
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const n = questions.length;
  const isResult = step >= n;

  useEffect(() => {
    const on = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', on);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', on); document.body.style.overflow = ''; };
  }, [onClose]);

  const answer = (val) => { setAnswers(a => ({ ...a, [step]: val })); setTimeout(() => setStep(s => s + 1), 180); };
  const score = Object.values(answers).reduce((a, b) => a + b, 0);

  return (
    <div role="dialog" aria-modal="true" onClick={onClose} style={{ position:'fixed', inset:0, zIndex:1000, background:'rgba(10,13,20,.55)', backdropFilter:'blur(10px)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div onClick={e => e.stopPropagation()} style={{ width:'min(720px,100%)', maxHeight:'90vh', overflow:'auto', background:'var(--paper)', border:'1px solid var(--line)', padding:'44px 48px', position:'relative', borderRadius:8, fontFamily:'"Manrope",sans-serif', color:'var(--ink)', boxShadow:'0 40px 100px -20px rgba(0,0,0,.35)' }}>
        <button onClick={onClose} aria-label="Zamknij" style={{ position:'absolute', top:18, right:18, width:36, height:36, background:'transparent', border:'1px solid var(--line-2)', color:'var(--ink)', cursor:'pointer', fontFamily:'JetBrains Mono', fontSize:14, borderRadius:999 }}>×</button>
        <div className="mono" style={{ fontSize:11, letterSpacing:'.18em', color:'var(--accent)', textTransform:'uppercase', marginBottom:14 }}>Test Sabotażystów · Demo</div>
        {!isResult ? (
          <>
            <div className="mono" style={{ fontSize:11, color:'var(--ink-faint)', letterSpacing:'.12em', marginBottom:24 }}>PYTANIE {step + 1} / {n}</div>
            <h3 className="display" style={{ fontSize:'clamp(24px,3vw,36px)', lineHeight:1.1, margin:'0 0 36px', letterSpacing:'-.02em' }}>{questions[step]}</h3>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8, marginBottom:24 }}>
              {[['1','wcale'],['2','rzadko'],['3','czasem'],['4','często'],['5','zawsze']].map(([v, l]) => (
                <button key={v} onClick={() => answer(parseInt(v,10))} style={{ appearance:'none', cursor:'pointer', padding:'18px 6px', background:'transparent', color:'var(--ink)', border:'1px solid var(--line-2)', display:'grid', placeItems:'center', gap:6, fontFamily:'inherit', borderRadius:4, transition:'all .15s ease' }}
                  onMouseEnter={e => { e.currentTarget.style.background='var(--accent)'; e.currentTarget.style.color='var(--accent-ink)'; e.currentTarget.style.borderColor='var(--accent)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--ink)'; e.currentTarget.style.borderColor='var(--line-2)'; }}>
                  <span className="display" style={{ fontSize:24, lineHeight:1 }}>{v}</span>
                  <span className="mono" style={{ fontSize:10, letterSpacing:'.12em', textTransform:'uppercase' }}>{l}</span>
                </button>
              ))}
            </div>
            <div style={{ height:3, background:'var(--paper-3)', borderRadius:999 }}>
              <div style={{ height:'100%', width:`${(step/n)*100}%`, background:'var(--accent)', borderRadius:999, transition:'width .25s ease' }} />
            </div>
          </>
        ) : (
          <>
            <h3 className="display" style={{ fontSize:'clamp(28px,3.4vw,44px)', lineHeight:1.05, margin:'0 0 20px', letterSpacing:'-.02em' }}>
              Wynik demo:&nbsp;<span style={{ color:'var(--accent)' }}>{score >= 18 ? 'Sędzia + Hyper-Achiever' : score >= 12 ? 'Sędzia + Kontroler' : 'Sędzia + Please-r'}</span>
            </h3>
            <p style={{ fontSize:16, color:'var(--ink-soft)', lineHeight:1.65, margin:'0 0 28px', maxWidth:'56ch' }}>
              To tylko mini-szkic. Pełny Test Sabotażystów ma 75 pytań i wymaga ~15 minut. Otrzymujesz raport PDF z 10 sabotażystów + interpretacją dwóch dominujących. Następny krok: 30 min Discovery Call, w którym omawiamy go razem.
            </p>
            <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
              <a href="#" className="btn btn-primary">Zrób pełny test · 15 min <span className="arrow">→</span></a>
              <a href="#" className="btn btn-ghost">Discovery Call · Zencal</a>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

}
