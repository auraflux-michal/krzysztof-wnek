<script type="text/babel">
function useReveal() {
  React.useEffect(() => {
    const io = new IntersectionObserver((entries)=>{entries.forEach((e)=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});},{threshold:0.1,rootMargin:"0px 0px -40px 0px"});
    document.querySelectorAll(".reveal").forEach((el)=>io.observe(el));
    return ()=>io.disconnect();
  }, []);
}
const Ic = {
  Arr: () => (<span style={{display:"inline-block"}}>→</span>),
  Yt:  () => (<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.6 7.2c-.2-.9-.9-1.5-1.7-1.7C18.3 5 12 5 12 5s-6.3 0-7.9.5c-.8.2-1.5.8-1.7 1.7C2 8.8 2 12 2 12s0 3.2.4 4.8c.2.9.9 1.5 1.7 1.7C5.7 19 12 19 12 19s6.3 0 7.9-.5c.8-.2 1.5-.8 1.7-1.7.4-1.6.4-4.8.4-4.8s0-3.2-.4-4.8zM10 15V9l5 3-5 3z"/></svg>),
  In:  () => (<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h4v16H4zM6 1.5C4.6 1.5 3.5 2.6 3.5 4S4.6 6.5 6 6.5 8.5 5.4 8.5 4 7.4 1.5 6 1.5zM20 12.5c0-2.7-1.5-4.5-4-4.5-1.5 0-2.4.8-2.8 1.6V8H10v12h3.5v-6.3c0-1.5.5-2.5 1.9-2.5s1.8 1 1.8 2.5V20H20v-7.5z"/></svg>),

  Ig:  () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>),
};
function Nav() {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(()=>{const fn=()=>setScrolled(window.scrollY>60);fn();window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn);},[]);
  return (
    <nav className={"nav"+(scrolled?" scrolled":"")}>
      <div className="nav-inner">
        <a className="nav-brand" href="index.html"><div className="mono-kw">KW</div><div className="nav-brand-name">Krzysztof Wnęk<span className="small">Mówca · Mentor</span></div></a>
        <div className="nav-links">
          <a href="dla-ciebie.html">Dla Ciebie</a><a href="dla-firm.html">Dla Firm</a><a href="o-mnie.html">O Mnie</a>
          <a href="https://www.youtube.com/@PozytywnaInteligencja" target="_blank" rel="noreferrer">YouTube</a>
        </div>
        <div className="nav-cta-wrap">
          <a href="umow-rozmowe.html" className="btn btn-teal" style={{padding:"12px 20px"}}>Umów rozmowę <span className="arrow">→</span></a>

        </div>
      </div>

  );
}

        </div>
      </div>
    </div></footer>
  );
}

const faqItems = [

  {q:"Ile czasu zajmuje program tygodniowo?",a:"Około 1 godziny dziennie — 15 minut ćwiczeń mentalnych (aplikacja) + dostęp do treści wideo + cotygodniowe sesje grupowe. To nie jest kurs — to codzienność."},
  {q:"Czy to jest coaching?",a:"To coś więcej. Program PQ łączy neurobiologię, pozytywną psychologię i coaching. Budujesz dosłownie nowe ścieżki neuronalne. Efekty są mierzalne i trwałe."},
  {q:"Dla kogo to jest program?",a:"Dla liderów, menedżerów i przedsiębiorców, którzy osiągnęli sukces — ale odkryli, że coś im umyka. Radość, spokój, obecność. Umów rozmowę — sprawdzimy razem."},
  {q:"Czy mogę płacić ratalnie?",a:"Tak. Opcja ratalna: 12 × 300 PLN. Pełna cena: 4 000 — 5 000 PLN. Szczegóły na rozmowie Discovery."},
];
function FaqItem({q,a}) {
  const [open,setOpen]=React.useState(false);
  return (
    <div className="faq-item">
      <div className="faq-q" onClick={()=>setOpen(!open)}>{q}<span className="plus">{open?"−":"+"}</span></div>
      {open&&<div className="faq-a">{a}</div>}
    </div>
  );
}

            <p style={{fontSize:"15.5px",lineHeight:1.7,color:"var(--text-muted)",margin:0,maxWidth:"52ch"}}>Pracowałem z ponad 200 liderami. Widzę tę różnicę u każdego z nich.</p>

        </div></div>

          </div>
        </div>
      </section>

      <section className="dark sec-tight">
        <div className="wrap" style={{textAlign:"center"}}>
          <div className="eyebrow on-dark reveal">03 <span className="em">—</span> Inwestycja</div>

      <section className="sec light">
        <div className="wrap">
          <div className="eyebrow reveal">04 <span className="em">—</span> Pytania</div>
          <h2 style={{fontFamily:"var(--display)",fontStyle:"italic",fontWeight:400,fontSize:"clamp(48px,6vw,88px)",lineHeight:1,letterSpacing:"-0.02em",margin:"18px 0 64px"}} className="reveal" data-delay="1">FAQ.</h2>
          <div className="faq reveal" data-delay="2">{faqItems.map((item,i)=><FaqItem key={i} {...item} />)}</div>
        </div>
      </section>

      <section className="dark sec-tight">
        <div className="wrap" style={{textAlign:"center"}}>

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
